<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Menu Demo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
}

/* Header */

.header{
background:#fc8019;
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* Container */

.container{
max-width:480px;
margin:auto;
padding:15px;
padding-bottom:160px;
}

/* Inputs */

.customer-box{
background:white;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.customer-box input{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ddd;
border-radius:6px;
}

/* Search */

.search-box input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

/* Categories */

.categories{
display:flex;
gap:8px;
overflow-x:auto;
margin-bottom:10px;
}

.cat-btn{
padding:6px 10px;
border:none;
background:#eee;
border-radius:20px;
cursor:pointer;
}

.cat-btn.active{
background:#fc8019;
color:white;
}

/* Menu item */

.menu-item{
display:flex;
align-items:center;
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

.food-img{
width:60px;
height:60px;
border-radius:8px;
object-fit:cover;
margin-right:10px;
}

.food-info{
flex:1;
}

.price{
color:#777;
}

/* Quantity */

.qty-box{
display:flex;
align-items:center;
gap:6px;
}

.qty-btn{
background:#fc8019;
color:white;
border:none;
padding:4px 8px;
border-radius:4px;
}

/* Floating cart */

.cart-float{
position:fixed;
bottom:70px;
right:15px;
background:#27ae60;
color:white;
padding:12px 14px;
border-radius:30px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Footer */

.footer-offer{
position:fixed;
bottom:0;
width:100%;
background:black;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.register-btn{
background:#fc8019;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
}

/* Popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:20px;
width:90%;
max-width:350px;
border-radius:8px;
}

.popup-content input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">🍽 Demo Restaurant Menu</div>

<div class="container">

<div class="customer-box">
<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="mobile" placeholder="Enter Mobile">
</div>

<div class="search-box">
<input type="text" placeholder="Search food..." onkeyup="searchFood(this.value)">
</div>

<div class="categories">
<button class="cat-btn active" onclick="filterCat('all')">All</button>
<button class="cat-btn" onclick="filterCat('burger')">Burger</button>
<button class="cat-btn" onclick="filterCat('pizza')">Pizza</button>
<button class="cat-btn" onclick="filterCat('drink')">Drinks</button>
</div>

<div id="menu">

</div>

</div>

<div class="cart-float" onclick="sendOrder()">
🛒 ₹<span id="total">0</span>
</div>

<div class="footer-offer">
<div>🔥 One Time Offer - 20% OFF</div>
<button class="register-btn" onclick="openPopup()">Register</button>
</div>

<div class="popup" id="popup">
<div class="popup-content">
<h3>Register</h3>
<input type="text" placeholder="Name">
<input type="text" placeholder="Mobile">
<button onclick="register()">Submit</button>
</div>
</div>

<script>

let products=[

{name:"Burger",price:120,cat:"burger",img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
{name:"Cheese Burger",price:150,cat:"burger",img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Pizza",price:250,cat:"pizza",img:"https://images.unsplash.com/photo-1593560708920-61dd98c46a4e"},
{name:"Veg Pizza",price:220,cat:"pizza",img:"https://images.unsplash.com/photo-1513104890138-7c749659a591"},
{name:"Cold Coffee",price:80,cat:"drink",img:"https://images.unsplash.com/photo-1517705008128-361805f42e86"},
{name:"Mojito",price:110,cat:"drink",img:"https://images.unsplash.com/photo-1551024709-8f23befc6f87"}

];

let cart={};

function renderMenu(list){

let html="";

list.forEach(p=>{

let qty=cart[p.name]||0;

html+=`

<div class="menu-item">

<img src="${p.img}" class="food-img">

<div class="food-info">
${p.name}
<div class="price">₹${p.price}</div>
</div>

<div class="qty-box">

<button class="qty-btn" onclick="updateQty('${p.name}',-1)">-</button>

<span>${qty}</span>

<button class="qty-btn" onclick="updateQty('${p.name}',1)">+</button>

</div>

</div>

`;

});

document.getElementById("menu").innerHTML=html;

}

renderMenu(products);

function updateQty(name,change){

cart[name]=(cart[name]||0)+change;

if(cart[name]<0) cart[name]=0;

updateTotal();

renderMenu(products);

}

function updateTotal(){

let total=0;

products.forEach(p=>{

if(cart[p.name]){

total+=p.price*cart[p.name];

}

});

document.getElementById("total").innerText=total;

}

function searchFood(q){

let res=products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));

renderMenu(res);

}

function filterCat(cat){

if(cat=="all"){

renderMenu(products);

}else{

renderMenu(products.filter(p=>p.cat==cat));

}

}

function sendOrder(){

let name=document.getElementById("name").value;

let mobile=document.getElementById("mobile").value;

let items="";

for(let k in cart){

if(cart[k]>0){

items+=k+" x"+cart[k]+"%0A";

}

}

let url="https://wa.me/919999999999?text=Order%0ACustomer:"+name+"%0AMobile:"+mobile+"%0AItems:%0A"+items;

window.open(url);

}

function openPopup(){

document.getElementById("popup").style.display="flex";

}

function register(){

alert("Registration Successful");

document.getElementById("popup").style.display="none";

}

</script>

</body>
</html>
