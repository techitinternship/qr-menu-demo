<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Menu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background:#f5f5f5;
}

/* Header */

.header{
background:#fc8019;
color:white;
padding:16px;
font-size:20px;
font-weight:600;
text-align:center;
}

/* Container */

.container{
max-width:480px;
margin:auto;
padding:15px;
}

/* Restaurant Select */

.restaurant-select{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
margin-bottom:15px;
}

.restaurant-select select,
.restaurant-select input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

/* Menu title */

.menu-title{
font-size:18px;
font-weight:600;
margin:15px 0;
}

/* Menu Card */

.menu-card{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.menu-info{
display:flex;
flex-direction:column;
}

.menu-name{
font-weight:600;
font-size:16px;
}

.menu-price{
color:#777;
font-size:14px;
margin-top:3px;
}

.add-btn{
background:#fc8019;
color:white;
border:none;
padding:7px 14px;
border-radius:6px;
cursor:pointer;
}

/* Cart */

.cart{
background:white;
padding:15px;
margin-top:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.order-btn{
width:100%;
background:#27ae60;
color:white;
border:none;
padding:12px;
border-radius:6px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
🍽 QR Restaurant Menu
</div>

<div class="container">

<div class="restaurant-select">

<select id="restaurant">
<option value="">Select Restaurant</option>
<option value="r1">Spice Garden</option>
<option value="r2">Food Hub</option>
</select>

<input type="text" id="name" placeholder="Enter your name">
<input type="text" id="mobile" placeholder="Enter mobile number">

</div>

<div class="menu-title">Menu</div>

<div class="menu-card">
<div class="menu-info">
<div class="menu-name">Veg Burger</div>
<div class="menu-price">₹120</div>
</div>
<button class="add-btn" onclick="addItem('Veg Burger',120)">Add</button>
</div>

<div class="menu-card">
<div class="menu-info">
<div class="menu-name">Pizza</div>
<div class="menu-price">₹250</div>
</div>
<button class="add-btn" onclick="addItem('Pizza',250)">Add</button>
</div>

<div class="menu-card">
<div class="menu-info">
<div class="menu-name">Cold Coffee</div>
<div class="menu-price">₹80</div>
</div>
<button class="add-btn" onclick="addItem('Cold Coffee',80)">Add</button>
</div>

<div class="cart">
<h3 id="cart">Cart Empty</h3>
<button class="order-btn" onclick="sendOrder()">Place Order</button>
</div>

</div>

<script>

let cart=[];

function addItem(name,price){

cart.push(name+" ₹"+price);

document.getElementById("cart").innerHTML="🛒 "+cart.join(", ");

}

function sendOrder(){

let restaurant=document.getElementById("restaurant").value;
let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;

let phone="";

if(restaurant=="r1"){
phone="919082369588";
}

if(restaurant=="r2"){
phone="918652352366";
}

let msg="New Order%0A";
msg+="Restaurant: "+restaurant+"%0A";
msg+="Customer: "+name+"%0A";
msg+="Mobile: "+mobile+"%0A";
msg+="Items: "+cart.join(", ");

let url="https://wa.me/"+phone+"?text="+msg;

window.open(url);

}

</script>

</body>
</html>
