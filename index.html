<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Menu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🍽 Restaurant Menu</h1>

<div class="login-box">
<input type="text" id="name" placeholder="Enter Your Name">
<input type="text" id="mobile" placeholder="Enter Mobile Number">
</div>

<h2>Menu</h2>

<div class="menu">

<div class="card">
<h3>🍔 Veg Burger</h3>
<p>Price: ₹120</p>
<button onclick="addItem('Veg Burger',120)">Add to Cart</button>
</div>

<div class="card">
<h3>🍕 Pizza</h3>
<p>Price: ₹250</p>
<button onclick="addItem('Pizza',250)">Add to Cart</button>
</div>

<div class="card">
<h3>🥤 Cold Coffee</h3>
<p>Price: ₹80</p>
<button onclick="addItem('Cold Coffee',80)">Add to Cart</button>
</div>

</div>

<div class="cart-box">
<h3 id="cart">🛒 Cart Empty</h3>
<button class="order-btn" onclick="sendOrder()">Place Order</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
